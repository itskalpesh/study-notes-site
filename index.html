<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Study Notes</title>
<meta name="description" content="A documentation-style site generated automatically from an Obsidian Markdown vault." />

<!-- Inline SVG favicon: an open notebook mark, tinted to match the accent color -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231B1E24'/%3E%3Cpath d='M6 9c4-2 7-2 10 0v16c-3-2-6-2-10 0V9Z' fill='none' stroke='%23F2B84B' stroke-width='1.8' stroke-linejoin='round'/%3E%3Cpath d='M26 9c-4-2-7-2-10 0v16c3-2 6-2 10 0V9Z' fill='none' stroke='%23F2B84B' stroke-width='1.8' stroke-linejoin='round'/%3E%3C/svg%3E" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="style.css" />
</head>
<body>

<a class="skip-link" href="#main-content">Skip to content</a>

<div class="progress-bar" id="progressBar" aria-hidden="true"></div>

<header class="topnav">
  <div class="topnav-inner">
    <button id="menuToggle" class="icon-btn mobile-only" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="sidebar">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>

    <a href="#/" class="brand" aria-label="Study Notes home">
      <svg class="brand-mark" viewBox="0 0 32 32" width="26" height="26" aria-hidden="true">
        <rect width="32" height="32" rx="8" fill="currentColor" class="brand-mark-bg"/>
        <path d="M7 9c4-2 7-2 9 0v15c-2-2-5-2-9 0V9Z" fill="none" stroke="var(--accent)" stroke-width="1.7" stroke-linejoin="round"/>
        <path d="M25 9c-4-2-7-2-9 0v15c2-2 5-2 9 0V9Z" fill="none" stroke="var(--accent)" stroke-width="1.7" stroke-linejoin="round"/>
      </svg>
      <span class="brand-text">Study Notes</span>
    </a>

    <button id="searchTrigger" class="search-trigger" aria-haspopup="dialog">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <span class="search-trigger-label">Search notes…</span>
      <kbd class="kbd-hint">Ctrl K</kbd>
    </button>

    <button id="themeToggle" class="icon-btn" aria-label="Toggle dark mode">
      <svg class="icon-sun" viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2.5v2.5M12 19v2.5M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2.5 12H5M19 12h2.5M4.2 19.8 6 18M18 6l1.8-1.8"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z"/></svg>
    </button>
  </div>
</header>

<div class="layout">
  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

  <aside id="sidebar" class="sidebar" aria-label="Notes navigation">
    <div class="sidebar-scroll">
      <nav id="sidebarTree" class="sidebar-tree" aria-label="Subjects">
        <div class="sidebar-loading">Loading notes…</div>
      </nav>
    </div>
  </aside>

  <main id="main-content" class="content" tabindex="-1">
    <div id="contentInner" class="content-inner"></div>
  </main>

  <aside id="tocRail" class="toc-rail" aria-label="On this page" hidden>
    <p class="toc-label">On this page</p>
    <nav id="tocNav"></nav>
  </aside>
</div>

<button id="scrollTopBtn" class="scroll-top-btn" aria-label="Scroll to top">
  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V6M6 11l6-6 6 6"/></svg>
</button>

<div id="searchModal" class="search-modal" role="dialog" aria-modal="true" aria-label="Search notes" hidden>
  <div class="search-modal-backdrop" id="searchBackdrop"></div>
  <div class="search-modal-panel">
    <div class="search-input-row">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="searchInput" type="text" placeholder="Search subjects, notes, content…" autocomplete="off" spellcheck="false" />
      <kbd class="kbd-hint">Esc</kbd>
    </div>
    <div id="searchResults" class="search-results"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/16.3.0/lib/marked.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.4.8/purify.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<script src="script.js" defer></script>
</body>
</html>
